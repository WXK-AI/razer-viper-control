name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build release artifacts
        run: bash scripts/ci-release-build.sh

      - name: Package downloads
        run: |
          cd build/Release
          ditto -c -k --sequesterRsrc --keepParent RazerMenuBarApp.app RazerMenuBarApp-macOS.zip
          zip -j RazerProbeCLI-macOS.zip RazerProbeCLI
          shasum -a 256 *.zip > SHA256SUMS.txt
          ls -la

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Razer Viper Control ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            build/Release/RazerMenuBarApp-macOS.zip
            build/Release/RazerProbeCLI-macOS.zip
            build/Release/SHA256SUMS.txt
          body: |
            ## Install RazerMenuBarApp

            1. Download `RazerMenuBarApp-macOS.zip` and unzip.
            2. Drag **RazerMenuBarApp.app** to **Applications**.
            3. First launch: right-click the app → **Open** (bypasses Gatekeeper for ad-hoc builds).
            4. Grant **Input Monitoring** and **Accessibility** in System Settings when prompted (or via Settings → Diagnostics).

            ## Optional: RazerProbeCLI

            Unzip `RazerProbeCLI-macOS.zip`, then in Terminal:

            ```bash
            chmod +x RazerProbeCLI
            ./RazerProbeCLI list
            ```

            Requires **Input Monitoring** for `input-capture`.

            **Platform:** macOS 13+, Apple Silicon (arm64). Intel Macs are not built in CI yet.
